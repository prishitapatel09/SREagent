name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install agent + test deps
        run: pip install -e "./agent[test]"
      - name: Verify seeded history builds and passes its own checks
        run: python3 scripts/seed_history.py
      - name: Unit + integration tests
        run: make test
      - name: Pipeline smoke test (stub mode, no LLM)
        run: make smoke
